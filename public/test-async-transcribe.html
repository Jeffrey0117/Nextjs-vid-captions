<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Async Whisper Transcription Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }

    .upload-area:hover {
      border-color: #667eea;
      background: #f9f9ff;
    }

    .upload-area.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    input[type="file"] {
      display: none;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 14px;
      font-weight: 500;
      color: #555;
    }

    select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .progress-container {
      margin-top: 30px;
      display: none;
    }

    .progress-container.active {
      display: block;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s;
      border-radius: 4px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      color: #666;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-queued {
      background: #fff3cd;
      color: #856404;
    }

    .status-processing {
      background: #d1ecf1;
      color: #0c5460;
    }

    .status-completed {
      background: #d4edda;
      color: #155724;
    }

    .status-error {
      background: #f8d7da;
      color: #721c24;
    }

    .result-container {
      margin-top: 20px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
      display: none;
    }

    .result-container.active {
      display: block;
    }

    .result-title {
      font-weight: 600;
      margin-bottom: 10px;
      color: #333;
    }

    .result-content {
      font-size: 14px;
      color: #666;
      word-break: break-all;
    }

    .error-message {
      color: #d9534f;
      font-weight: 500;
    }

    .log-container {
      margin-top: 20px;
      padding: 15px;
      background: #2d3748;
      color: #e2e8f0;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      display: none;
    }

    .log-container.active {
      display: block;
    }

    .log-entry {
      margin-bottom: 5px;
    }

    .log-timestamp {
      color: #a0aec0;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Async Whisper Transcription Test</h1>
    <p class="subtitle">Upload a video to test async transcription with real-time progress</p>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📹</div>
      <p><strong>Click to upload</strong> or drag and drop</p>
      <p style="font-size: 12px; color: #999; margin-top: 5px;">MP4, MOV, AVI (max 100MB)</p>
      <input type="file" id="fileInput" accept="video/*">
    </div>

    <div class="settings">
      <div class="setting-group">
        <label for="modelSelect">Whisper Model</label>
        <select id="modelSelect">
          <option value="tiny">Tiny (fastest)</option>
          <option value="base" selected>Base (recommended)</option>
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large (slowest)</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="languageSelect">Language</label>
        <select id="languageSelect">
          <option value="auto" selected>Auto Detect</option>
          <option value="en">English</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
        </select>
      </div>
    </div>

    <button id="startBtn" disabled>Select a video file</button>

    <div class="progress-container" id="progressContainer">
      <div class="progress-info">
        <span id="statusText">Status: <span class="status-badge status-queued">Queued</span></span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p id="messageText" style="font-size: 13px; color: #888; text-align: center;"></p>
    </div>

    <div class="result-container" id="resultContainer">
      <div class="result-title">Result</div>
      <div class="result-content" id="resultContent"></div>
    </div>

    <div class="log-container" id="logContainer">
      <!-- Logs will be added here -->
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const startBtn = document.getElementById('startBtn');
    const modelSelect = document.getElementById('modelSelect');
    const languageSelect = document.getElementById('languageSelect');
    const progressContainer = document.getElementById('progressContainer');
    const resultContainer = document.getElementById('resultContainer');
    const logContainer = document.getElementById('logContainer');

    let selectedFile = null;
    let currentTaskId = null;
    let pollInterval = null;

    // File selection
    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];
      if (selectedFile) {
        startBtn.disabled = false;
        startBtn.textContent = `Start Transcription (${selectedFile.name})`;
        log(`File selected: ${selectedFile.name} (${(selectedFile.size / 1024 / 1024).toFixed(2)} MB)`);
      }
    });

    // Drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#667eea';
      uploadArea.style.background = '#f9f9ff';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#ddd';
      uploadArea.style.background = 'transparent';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#ddd';
      uploadArea.style.background = 'transparent';

      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('video/')) {
        fileInput.files = e.dataTransfer.files;
        selectedFile = file;
        startBtn.disabled = false;
        startBtn.textContent = `Start Transcription (${file.name})`;
        log(`File dropped: ${file.name}`);
      }
    });

    // Start transcription
    startBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      startBtn.disabled = true;
      uploadArea.classList.add('disabled');
      progressContainer.classList.add('active');
      resultContainer.classList.remove('active');
      logContainer.classList.add('active');

      log('Starting transcription...');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('model', modelSelect.value);
        formData.append('language', languageSelect.value);

        const response = await fetch('/api/transcribe', {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          throw new Error('Failed to submit transcription task');
        }

        const data = await response.json();
        currentTaskId = data.taskId;

        log(`Task submitted: ${currentTaskId}`);
        log('Polling status...');

        // Start polling
        pollStatus();
      } catch (error) {
        log(`Error: ${error.message}`, true);
        showError(error.message);
        resetUI();
      }
    });

    // Poll task status
    async function pollStatus() {
      if (!currentTaskId) return;

      try {
        const response = await fetch(`/api/transcribe/status?taskId=${currentTaskId}`);
        if (!response.ok) {
          throw new Error('Failed to fetch task status');
        }

        const status = await response.json();

        // Update UI
        updateProgress(status.progress, status.status, status.message);

        if (status.status === 'completed') {
          log('Transcription completed!');
          showResult(status.result);
          resetUI();
        } else if (status.status === 'error') {
          log(`Error: ${status.error}`, true);
          showError(status.error);
          resetUI();
        } else {
          // Continue polling
          setTimeout(pollStatus, 2000);
        }
      } catch (error) {
        log(`Polling error: ${error.message}`, true);
        setTimeout(pollStatus, 2000); // Retry on error
      }
    }

    // Update progress UI
    function updateProgress(progress, status, message) {
      const statusBadge = document.querySelector('.status-badge');
      statusBadge.textContent = status;
      statusBadge.className = `status-badge status-${status}`;

      document.getElementById('progressText').textContent = `${Math.round(progress)}%`;
      document.getElementById('progressFill').style.width = `${progress}%`;

      if (message) {
        document.getElementById('messageText').textContent = message;
      }

      log(`Progress: ${Math.round(progress)}% - ${status}${message ? ` (${message})` : ''}`);
    }

    // Show result
    function showResult(result) {
      resultContainer.classList.add('active');
      document.getElementById('resultContent').innerHTML = `
        <p><strong>Video URL:</strong> ${result.videoUrl}</p>
        <p><strong>SRT Length:</strong> ${result.srtContent.length} bytes</p>
        <p style="margin-top: 10px;"><strong>Preview:</strong></p>
        <pre style="max-height: 200px; overflow-y: auto; padding: 10px; background: white; border-radius: 4px; font-size: 11px;">${result.srtContent.substring(0, 500)}${result.srtContent.length > 500 ? '...' : ''}</pre>
      `;
    }

    // Show error
    function showError(error) {
      resultContainer.classList.add('active');
      document.getElementById('resultContent').innerHTML = `
        <p class="error-message">Error: ${error}</p>
      `;
    }

    // Reset UI
    function resetUI() {
      startBtn.disabled = false;
      startBtn.textContent = 'Start Another Transcription';
      uploadArea.classList.remove('disabled');
    }

    // Logging
    function log(message, isError = false) {
      const timestamp = new Date().toLocaleTimeString();
      const logEntry = document.createElement('div');
      logEntry.className = 'log-entry';
      logEntry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span><span style="color: ${isError ? '#fc8181' : '#e2e8f0'}">${message}</span>`;
      logContainer.appendChild(logEntry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }
  </script>
</body>
</html>
